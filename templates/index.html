<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Chef Mate</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  


  <style>
    .macro-chart {
      text-align: center;
      margin: 20px 0;
    }
    .macro-chart img {
      width: 300px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .navbar {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background: linear-gradient(to right, #fca17d, #f96d6f );
    }
    
    .navbar img {
      height: 40px;
      object-fit: contain;
      width: auto;
    }

    /* Responsive form styling */
    @media (max-width: 768px) {
      .chat-box form {
        flex-direction: row;
        flex-wrap: wrap;
      }

      .chat-box input[type="text"] {
        flex: 1 1 100%;
        min-width: 0;
      }

      .chat-box select {
        flex: 1 1 calc(50% - 5px);
        min-width: 0;
      }

      .chat-box button {
        flex: 1 1 100%;
      }
    }

    @media (max-width: 480px) {
      .macro-chart h4 {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <img src="{{ url_for('static', filename='chat/gradientlogo.png') }}" alt="Logo">
  </div>
  

  <div class="container">
    <main class="main-content">
      <h1>What's On your plate?</h1>

      <div class="chat-container-wrapper" id="chat-wrapper" {% if not chat_history %}style="display: none;"{% endif %}>
        <div class="chat-container" id="chat">
          {% for chat in chat_history %}
            <div class="user-message"><strong>You:</strong> {{ chat.user }}</div>
            <div class="bot-message"><strong>ChefMate:</strong> {{ chat.bot|safe }}</div>

            {% if chat.macros and chat.macros.chart_path %}
              <div class="macro-chart">
                <h4>📊 Macronutrient Pie Chart</h4>
                <img src="{{ url_for('static', filename='chat/mockchart.png') }}" alt="Macronutrient Chart">


              </div>
            {% endif %}
          {% endfor %}
          <div id="loading-indicator" style="display: none;">
            <div class="bot-message">
              <strong>ChefMate:</strong> 
              <span class="typing-indicator">
                <span></span><span></span><span></span>
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="chat-box">
        <form id="chat-form" method="POST">
          <input type="text" name="prompt" placeholder="Let's cook together.." required />
          <select name="cuisine">
            <option value="">Cuisine</option>
            <option value="indian">Indian</option>
            <option value="italian">Italian</option>
            <option value="thai">Thai</option>
          </select>
          <select name="time">
            <option value="">Time</option>
            <option value="10">10 min</option>
            <option value="20">20 min</option>
            <option value="30">30 min</option>
          </select>
          <button type="submit"><i class="fas fa-paper-plane"></i></button>
        </form>
      </div>

      <script>
        const chatContainer = document.getElementById("chat");
        const chatWrapper = document.getElementById("chat-wrapper");
        const form = document.getElementById("chat-form");
        const submitButton = form.querySelector("button[type='submit']");
        const loadingIndicator = document.getElementById("loading-indicator");

        // Auto-scroll to bottom
        function scrollToBottom() {
          if (chatContainer) {
            chatContainer.scrollTop = chatContainer.scrollHeight;
          }
        }

        // Show loading state when form is submitted
        form.addEventListener("submit", function(e) {
          // Show chat wrapper if hidden
          chatWrapper.style.display = "block";
          
          // Show loading indicator
          loadingIndicator.style.display = "block";
          submitButton.disabled = true;
          submitButton.style.opacity = "0.6";
          submitButton.style.cursor = "not-allowed";
          
          // Scroll to show the loading message
          setTimeout(scrollToBottom, 100);
        });

        // Scroll to bottom on page load
        scrollToBottom();
      </script>
    </main>
  </div>
</body>
</html>
